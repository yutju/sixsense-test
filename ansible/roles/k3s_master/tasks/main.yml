---
- name: k3s_token 변수 존재 확인
  assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: "k3s_token 을 Terraform output 기반으로 전달해야 합니다."
  tags: [k3s_master, token]

- name: Swap 비활성화 설정
  block:
    - name: swap 비활성화
      command: swapoff -a
      changed_when: false

    - name: /etc/fstab 의 swap 항목 주석 처리
      replace:
        path: /etc/fstab
        regexp: '^(?!#)(.*\sswap\s+.*)$'
        replace: '# \1'

    - name: vm.swappiness 를 0 으로 설정
      sysctl:
        name: vm.swappiness
        value: "0"
        state: present
        sysctl_set: true
        reload: true
  tags: [k3s_master, swap]

- name: K3s 마스터 바이너리 설치 여부 확인
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin
  tags: [k3s_master, k3s_install]

- name: k3s config 디렉터리 생성
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  tags: [k3s_master, config]

- name: k3s config 렌더링
  template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  notify:
    - restart k3s
  tags: [k3s_master, config]

- name: K3s 설치 스크립트 다운로드
  get_url:
    url: https://get.k3s.io
    dest: /usr/local/src/get-k3s.sh
    mode: "0755"
  tags: [k3s_master, k3s_install]

- name: K3s 마스터 설치 실행
  command: /usr/local/src/get-k3s.sh
  environment:
    INSTALL_K3S_EXEC: server
    K3S_TOKEN: "{{ k3s_token }}"
  when: not k3s_bin.stat.exists
  notify:
    - daemon-reload
    - restart k3s
  tags: [k3s_master, k3s_install]

- name: K3s 마스터 서비스 시작 및 활성화
  service:
    name: k3s
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [k3s_master, service]

- name: k3s 서비스 환경 파일 렌더링
  template:
    src: k3s.service.env.j2
    dest: /etc/systemd/system/k3s.service.env
    mode: "0600"
  notify:
    - daemon-reload
    - restart k3s
  tags: [k3s_master, config]

- name: kubeconfig 디렉터리 생성
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [k3s_master, config]

- name: 사용자 kubeconfig 복사
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
    remote_src: true
  tags: [k3s_master, config]

- name: 사용자 bashrc 에 KUBECONFIG 기본값 설정
  blockinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    marker: "# {mark} SIXSENSE KUBECONFIG"
    block: |
      if [ -z "${KUBECONFIG:-}" ] && [ -f "$HOME/.kube/config" ]; then
        export KUBECONFIG="$HOME/.kube/config"
      fi
  tags: [k3s_master, config]

- name: Bootstrap 사전 점검
  import_tasks: precheck.yml
  tags: [k3s_master, bootstrap]

- name: Argo CD bootstrap 적용
  import_tasks: bootstrap.yml
  when: (argocd_bootstrap_required | default(false)) or (eso_bootstrap_required | default(false))
  tags: [k3s_master, bootstrap]

- name: argocd CLI 설치
  import_tasks: argocd-cli.yml
  tags: [k3s_master, argocd, argocd_cli]

- name: Doc Converter ConfigMap 적용
  import_tasks: doc-converter-config.yml
  tags: [k3s_master, doc_converter]

- name: Kafka alias 적용
  import_tasks: kafka-alias.yml
  tags: [k3s_master, kafka_alias]

- name: Root application 적용
  import_tasks: root-app.yml
  tags: [k3s_master, argocd, root_app]
